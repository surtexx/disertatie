name: POC

on:
    workflow_dispatch:
        inputs:
            PROJECT_KEY:
                description: "SonarQube Project Key"
                required: true
                type: string
            TRIGGER_NEW_SCAN:
                description: "Trigger a new SonarQube scan (true/false)"
                required: true
                type: boolean
            MODEL:
                description: "Model to use for analysis (default: gpt-4.1)"
                type: choice
                default: "gpt-4.1"
                options:
                    - "gpt-4.1"
                    - "gpt-5.2"
                    - "gpt-5.4"
                    - "claude-sonnet-4.5"
                    - "claude-sonnet-4.6"

jobs:
    sonarqube-scan:
        name: sonarqube-scan
        runs-on: ubuntu-latest
        if: ${{ inputs.TRIGGER_NEW_SCAN == 'true' }}
        env:
            SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Shallow clones should be disabled for better analysis
                  submodules: true # Ensure submodules are also checked out

            - name: SonarQube Scan
              uses: sonarsource/sonarqube-scan-action@master
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
              with:
                  projectBaseDir: ${{ inputs.PROJECT_KEY }}
                  args: >
                      -Dsonar.projectKey=${{ inputs.PROJECT_KEY }}

    filter-fp-dry-run:
        name: filter-fp-dry-run
        runs-on: ubuntu-latest
        if: always()
        needs: sonarqube-scan
        env:
            SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            GH_TOKEN: ${{ secrets.GH_TOKEN }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Shallow clones should be disabled for better analysis

            - name: Filter False Positives (Dry Run)
              uses: surtexx/filter-fp@v1.0.0
              with:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
                  PROJECT_KEY: ${{ inputs.PROJECT_KEY }}
                  MODEL: ${{ inputs.MODEL }}
                  APPLY: false
                  OUTPUT_FILE: "results.txt"

    filter-fp:
        name: filter-fp
        runs-on: ubuntu-latest
        if: always()
        needs: filter-fp-dry-run
        environment: manual-approval
        env:
            SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            GH_TOKEN: ${{ secrets.GH_TOKEN }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Filter False Positives (Apply)
              uses: surtexx/filter-fp@v1.0.0
              with:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
                  PROJECT_KEY: ${{ inputs.PROJECT_KEY }}
                  MODEL: ${{ inputs.MODEL }}
                  APPLY: true
                  INPUT_FILE: "results.txt"
